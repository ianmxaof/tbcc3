<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TBCC — screenshot → reverse search</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 16px 20px 32px;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      font-size: 14px;
      background: #1e1e2e;
      color: #cdd6f4;
      max-width: 720px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 600;
      color: #a6e3a1;
    }
    .hint {
      margin: 0 0 16px;
      font-size: 12px;
      color: #6c7086;
      line-height: 1.45;
    }
    .preview {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid #45475a;
      margin-bottom: 14px;
      display: block;
      background: #11111b;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    button.primary {
      background: #a6e3a1;
      color: #1e1e2e;
    }
    button.primary:hover {
      filter: brightness(1.06);
    }
    button.secondary {
      background: #45475a;
      color: #cdd6f4;
    }
    button.secondary:hover {
      background: #585b70;
    }
    #status {
      font-size: 12px;
      color: #89b4fa;
      min-height: 1.2em;
      margin-top: 8px;
    }
    .err {
      color: #f38ba8;
    }
    code {
      background: #313244;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <h1>Screenshot ready</h1>
  <p class="hint">
    Click <strong>Copy image</strong>, then use <code>Ctrl+V</code> (or <code>Cmd+V</code>) in each search tab’s upload / camera area.
    If a site blocks paste, use its file upload control.
  </p>
  <img id="preview" class="preview" alt="Screenshot preview" hidden />
  <div class="row">
    <button type="button" class="primary" id="btnCopy">Copy image</button>
    <button type="button" class="secondary" id="btnOpenTabs">Open reverse search tabs</button>
  </div>
  <p id="status"></p>
  <script src="screenshot-reverse.js"></script>
</body>
</html>
