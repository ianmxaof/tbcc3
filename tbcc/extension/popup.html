<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TBCC</title>
  <link rel="stylesheet" href="styles/tokens.css" />
  <style>
    body {
      width: 300px;
      padding: 14px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: var(--tbcc-bg-base);
      color: var(--tbcc-text-primary);
      margin: 0;
    }
    body.tbcc-in-panel {
      width: 100%;
      max-width: none;
      min-height: 100%;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 15px;
      color: var(--tbcc-text-heading);
      font-weight: 600;
    }
    label { display: block; margin-bottom: 6px; color: var(--tbcc-text-secondary); font-size: 12px; }
    select {
      width: 100%;
      min-height: 36px;
      padding: 6px 8px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid var(--tbcc-bg-elevated);
      background: var(--tbcc-bg-surface);
      color: var(--tbcc-text-primary);
      font-size: 13px;
    }
    .lite-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 12px;
      color: var(--tbcc-text-secondary);
      cursor: pointer;
    }
    .lite-row input { margin: 0; }
    .btn {
      width: 100%;
      min-height: 38px;
      margin-bottom: 8px;
      padding: 0 12px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--tbcc-accent);
      color: #1e1e2e;
    }
    .btn-primary:hover { background: var(--tbcc-accent-hover); }
    .btn-secondary {
      background: var(--tbcc-bg-elevated);
      color: var(--tbcc-text-primary);
    }
    .btn-secondary:hover { background: #585b70; }
    .btn-green {
      background: #166534;
      color: #dcfce7;
    }
    .btn-green:hover { filter: brightness(1.06); }
    #captureStatus { margin-top: 6px; font-size: 11px; color: var(--tbcc-success); min-height: 1.2em; }
    #captureStatus.err { color: var(--tbcc-error); }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 11px;
      color: var(--tbcc-text-muted);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #6c7086; flex-shrink: 0; }
    .dot.ok { background: var(--tbcc-success); }
    .dot.bad { background: var(--tbcc-error); }
  </style>
</head>
<body>
  <h1>TBCC</h1>
  <label for="poolId">Content pool</label>
  <select id="poolId">
    <option value="">Loading…</option>
  </select>
  <label class="lite-row">
    <input type="checkbox" id="tbccLiteMode" />
    TBCC Lite (generic capture, smaller batches)
  </label>
  <button type="button" id="openGallery" class="btn btn-primary">Open gallery</button>
  <button type="button" class="btn btn-green" id="btnCaptureReverse">Reverse search (capture tab)</button>
  <p id="captureStatus"></p>
  <button type="button" id="openExtensionOptions" class="btn btn-secondary">Extension options</button>
  <div class="status-row">
    <span id="backendDot" class="dot" title="Backend"></span>
    <span id="backendStatus">Checking backend…</span>
  </div>
  <script src="launch-full-stack.js"></script>
  <script src="popup.js"></script>
</body>
</html>
