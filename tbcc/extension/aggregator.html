<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TBCC — multi-source search</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      font-size: 13px;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 16px;
      padding: 10px 14px;
      border-bottom: 1px solid #45475a;
      background: #181825;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      color: #f5c2e7;
    }
    header .q {
      color: #89b4fa;
      font-weight: 600;
    }
    header .hint {
      font-size: 11px;
      color: #6c7086;
      max-width: 520px;
      line-height: 1.35;
    }
    header a {
      color: #89b4fa;
      text-decoration: none;
      font-size: 12px;
    }
    header a:hover {
      text-decoration: underline;
    }
    .toolbar {
      margin-left: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .toolbar button {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: #45475a;
      color: #cdd6f4;
      cursor: pointer;
      font-size: 12px;
    }
    .toolbar button:hover {
      background: #585b70;
    }
    .toolbar button.primary {
      background: #f5c2e7;
      color: #1e1e2e;
    }
    .toolbar button.primary:hover {
      filter: brightness(1.08);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 340px), 1fr));
      gap: 10px;
      padding: 10px;
      align-items: stretch;
    }
    .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: #313244;
      border-radius: 8px;
      border: 1px solid #45475a;
      overflow: hidden;
    }
    .panel-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 10px;
      background: #181825;
      border-bottom: 1px solid #45475a;
      font-size: 12px;
      font-weight: 600;
      color: #bac2de;
    }
    .panel-top a {
      color: #89b4fa;
      font-size: 11px;
      text-decoration: none;
      white-space: nowrap;
    }
    .panel-top a:hover {
      text-decoration: underline;
    }
    .frame-wrap {
      flex: 1;
      min-height: 420px;
      position: relative;
      background: #11111b;
    }
    .frame-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .frame-fallback {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      text-align: center;
      font-size: 12px;
      color: #a6adc8;
      background: #11111b;
    }
    .frame-fallback.visible {
      display: flex;
    }
    .empty {
      padding: 48px 20px;
      text-align: center;
      color: #6c7086;
      font-size: 13px;
    }
    .empty a {
      color: #89b4fa;
    }
  </style>
</head>
<body>
  <header>
    <h1>Multi-source search — <span class="q" id="titleQuery">…</span></h1>
    <p class="hint" id="hint">
      Some sites block embedding; use <strong>Open</strong> on a panel or &quot;Open all in tabs&quot; below.
    </p>
    <div class="toolbar">
      <button type="button" class="primary" id="btnOpenAllTabs">Open all in tabs</button>
      <a href="#" id="linkOptions">Search settings</a>
    </div>
  </header>
  <div id="empty" class="empty" hidden>
    No sources enabled. Edit <code>model-search-sites.json</code> to add sites, then enable them in
    <a href="#" id="linkOptions2">extension options</a>.
  </div>
  <div class="grid" id="grid"></div>
  <script src="model-search-shared.js"></script>
  <script src="aggregator.js"></script>
</body>
</html>
