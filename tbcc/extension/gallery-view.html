<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TBCC Gallery view</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 16px; font-family: system-ui, sans-serif; background: #1e1e2e; color: #cdd6f4; min-height: 100vh; }
    h1 { font-size: 18px; margin-bottom: 12px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; }
    .toolbar button { padding: 6px 12px; border-radius: 6px; border: none; background: #45475a; color: #cdd6f4; cursor: pointer; font-size: 12px; }
    .toolbar button:hover { background: #585b70; }
    .toolbar button.primary { background: #89b4fa; color: #1e1e2e; }
    .toolbar select { padding: 6px 10px; background: #313244; color: #cdd6f4; border: 1px solid #45475a; border-radius: 6px; font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
    .cell { position: relative; aspect-ratio: 1; background: #313244; border-radius: 8px; overflow: hidden; border: 2px solid transparent; }
    .cell.selected { border-color: #89b4fa; }
    .cell input { position: absolute; top: 4px; left: 4px; z-index: 2; }
    .cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cell .placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #6c7086; font-size: 10px; text-align: center; }
    .empty { color: #6c7086; padding: 24px; text-align: center; }
  </style>
</head>
<body>
  <h1>Collected media</h1>
  <p style="font-size:12px;color:#a6adc8;margin-bottom:12px;">Items sent from the sidebar are stored here. Clear cache in sidebar Settings to reset.</p>
  <div class="toolbar">
    <input type="checkbox" id="selectAll" title="Select all"> <span id="count">0</span> selected
    <select id="poolSelect"></select>
    <button type="button" id="btnSend" class="primary" disabled>Send selected to TBCC</button>
    <button type="button" id="btnDelete">Remove selected</button>
  </div>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" style="display:none;">No collected media. Use the sidebar to send items to TBCC to populate this list.</div>
  <script src="gallery-view.js"></script>
</body>
</html>
